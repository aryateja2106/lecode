name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect workspaces
        run: |
          echo "Rust crates present: ${{ hashFiles('crates/**/Cargo.toml') != '' }}"
          echo "Web package present: ${{ hashFiles('web/package.json') != '' }}"
          echo "Scaffold CI OK — job-specific checks run once workspaces are populated."

  rust:
    name: Rust
    needs: bootstrap
    runs-on: ubuntu-latest
    if: hashFiles('crates/**/Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets

  web:
    name: Web
    needs: bootstrap
    runs-on: ubuntu-latest
    if: hashFiles('web/package.json') != ''
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
